name: Bug report
description: Something isn't working
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the report! For **security vulnerabilities**, please do NOT file a
        public issue — see [SECURITY.md](../blob/main/SECURITY.md).
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: What did you expect, and what happened instead?
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Plugin version
      description: "From `.claude-plugin/plugin.json`, or the version shown by `plugin`."
      placeholder: "e.g. 0.11.0"
    validations:
      required: true
  - type: textarea
    id: env
    attributes:
      label: Environment
      description: OS, Bun version (`bun --version`), and how you run the server (Claude Code / watchdog / manual).
    validations:
      required: false
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Paste any relevant log output. **Redact phone numbers, auth data, and anything from `~/.whatsapp-channel/`.**
      render: shell
    validations:
      required: false
